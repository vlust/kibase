##############################################################################
# kibase GitLab CI/CD pipeline
#
# Stages:
#   validate  — ERC/DRC on all changed projects (MR + push)
#   review    — Generate review PDFs + KiRI diff (MR + push)
#   release   — Version bump, package registry upload, GitLab release (main)
#   deploy    — Publish docs to GitLab Pages (main only)
#
# Required CI variables:
#   GITLAB_BOT_TOKEN   — Project access token with write_repository + api scope
#                        (for KiRI pages branch, releases, and package registry)
##############################################################################

image: ghcr.io/inti-cern/kibot:dev

variables:
  GIT_DEPTH: 0                   # full history needed for version-bump + KiRI
  GIT_STRATEGY: clone
  FF_USE_FASTZIP: "true"
  # Set to "." for single-project repos (no projects/ subdirectory).
  KIBASE_PROJECTS_DIR: "projects"

stages:
  - validate
  - review
  - release
  - deploy

# ── helpers ──────────────────────────────────────────────────────────────────

.detect_projects: &detect_projects |
  CHANGED_PROJECTS="$(./scripts/detect-changed-projects.sh \
    "${CI_COMMIT_BEFORE_SHA:-${CI_MERGE_REQUEST_DIFF_BASE_SHA:-HEAD^}}" \
    "${CI_COMMIT_SHA}" 2>/dev/null || true)"
  if [[ -z "${CHANGED_PROJECTS}" ]]; then
    echo "No projects changed — skipping."
    exit 0
  fi
  echo "Changed projects: ${CHANGED_PROJECTS}"

.kibot_run: &kibot_run |
  # Run KiBot for a given project and stage.
  # Expects PROJECT and STAGE variables to be set.
  if [[ "${KIBASE_PROJECTS_DIR}" == "." ]]; then
    PROJECT_ROOT="."
  else
    PROJECT_ROOT="${KIBASE_PROJECTS_DIR}/${PROJECT}"
  fi
  KICAD_PRO="$(find "${PROJECT_ROOT}/kicad" -maxdepth 1 -name '*.kicad_pro' | head -n1)"
  if [[ -z "${KICAD_PRO}" ]]; then
    echo "Error: no .kicad_pro found in ${PROJECT_ROOT}/kicad/" >&2
    exit 1
  fi
  KICAD_STEM="$(basename "${KICAD_PRO}" .kicad_pro)"
  mkdir -p "${PROJECT_ROOT}/output"
  kibot \
    --board-file "${PROJECT_ROOT}/kicad/${KICAD_STEM}.kicad_pcb" \
    --schematic  "${PROJECT_ROOT}/kicad/${KICAD_STEM}.kicad_sch" \
    --config     "kibot/${STAGE}.yaml" \
    --out-dir    "${PROJECT_ROOT}/output"

# ── validate stage ───────────────────────────────────────────────────────────

validate:
  stage: validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
  script:
    - *detect_projects
    - |
      FAILED=0
      for PROJECT in ${CHANGED_PROJECTS}; do
        echo "━━ Validating ${PROJECT} ━━"
        STAGE=review
        *kibot_run || { echo "KiBot failed for ${PROJECT}"; FAILED=1; }

        ERC_REPORT="projects/${PROJECT}/output/review/reports/erc_${PROJECT}.rpt"
        if [[ -f "${ERC_REPORT}" ]]; then
          if grep -qE "^ERC violations: [1-9]" "${ERC_REPORT}"; then
            echo "ERC errors found in ${PROJECT}:"
            grep -E "^(ERC|Error)" "${ERC_REPORT}" || true
            FAILED=1
          else
            echo "ERC: OK (no violations)"
          fi
        fi
      done
      exit ${FAILED}
  artifacts:
    when: always
    paths:
      - projects/*/output/review/reports/
    expire_in: 7 days

# ── review stage ─────────────────────────────────────────────────────────────

review:generate:
  stage: review
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - *detect_projects
    - |
      for PROJECT in ${CHANGED_PROJECTS}; do
        echo "━━ Generating review outputs for ${PROJECT} ━━"
        STAGE=review
        *kibot_run
      done
  artifacts:
    name: "review-${CI_COMMIT_SHORT_SHA}"
    paths:
      - "*/output/review/"
    expire_in: 30 days

# KiRI visual diff (MR only) — deployed to kiri-pages branch
review:kiri:
  stage: review
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  needs: []
  script:
    - *detect_projects
    - |
      export KIRI_BASE="${CI_MERGE_REQUEST_DIFF_BASE_SHA}"
      for PROJECT in ${CHANGED_PROJECTS}; do
        echo "━━ Generating KiRI diff for ${PROJECT} ━━"
        if [[ "${KIBASE_PROJECTS_DIR}" == "." ]]; then
          PROJECT_ROOT="."
        else
          PROJECT_ROOT="${KIBASE_PROJECTS_DIR}/${PROJECT}"
        fi
        KICAD_PRO="$(find "${PROJECT_ROOT}/kicad" -maxdepth 1 -name '*.kicad_pro' | head -n1)"
        KICAD_STEM="$(basename "${KICAD_PRO}" .kicad_pro)"
        mkdir -p "${PROJECT_ROOT}/output"
        kibot \
          --board-file "${PROJECT_ROOT}/kicad/${KICAD_STEM}.kicad_pcb" \
          --schematic  "${PROJECT_ROOT}/kicad/${KICAD_STEM}.kicad_sch" \
          --config     "kibot/review.yaml" \
          --out-dir    "${PROJECT_ROOT}/output" \
          -e KIRI_BASE="${KIRI_BASE}" \
          --skip-pre all \
          kiri_diff
      done

    # Push KiRI output to kiri-pages branch for GitLab Pages
    - |
      if [[ -z "${GITLAB_BOT_TOKEN:-}" ]]; then
        echo "GITLAB_BOT_TOKEN not set — skipping Pages deployment (artifact fallback active)"
      else
        git config user.email "ci@kibase"
        git config user.name  "kibase CI"
        REMOTE="https://ci:${GITLAB_BOT_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git fetch "${REMOTE}" kiri-pages:kiri-pages 2>/dev/null || git checkout --orphan kiri-pages && git rm -rf . --quiet && git checkout kiri-pages || true
        git checkout kiri-pages
        mkdir -p "public/mr-${CI_MERGE_REQUEST_IID}"
        for PROJECT in ${CHANGED_PROJECTS}; do
          if [[ "${KIBASE_PROJECTS_DIR}" == "." ]]; then
            KIRI_OUT="output/kiri"
          else
            KIRI_OUT="${KIBASE_PROJECTS_DIR}/${PROJECT}/output/kiri"
          fi
          if [[ -d "${KIRI_OUT}" ]]; then
            cp -r "${KIRI_OUT}" "public/mr-${CI_MERGE_REQUEST_IID}/${PROJECT}"
          fi
        done
        git add public/
        if ! git diff --cached --quiet; then
          git commit -m "kiri: MR !${CI_MERGE_REQUEST_IID} — update diff pages"
          git push "${REMOTE}" kiri-pages
        fi
        for PROJECT in ${CHANGED_PROJECTS}; do
          KIRI_URL="https://${CI_PAGES_DOMAIN}/mr-${CI_MERGE_REQUEST_IID}/${PROJECT}/"
          curl --silent --fail --request POST \
            --header "PRIVATE-TOKEN: ${GITLAB_BOT_TOKEN}" \
            --data "body=KiRI diff for \`${PROJECT}\`: ${KIRI_URL}" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes" \
            || echo "Warning: failed to post MR comment"
        done
      fi
  artifacts:
    expose_as: 'KiRI Diff'
    paths:
      - "*/output/kiri/"
    expire_in: 30 days

# ── release stage ────────────────────────────────────────────────────────────

release:
  stage: release
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs: [review:generate]
  script:
    - *detect_projects
    - |
      git config user.email "ci@kibase"
      git config user.name  "kibase CI"

      # Determine which projects need a version bump
      BUMPED_PROJECTS=""
      for PROJECT in ${CHANGED_PROJECTS}; do
        if python3 scripts/version-bump.py --dry-run "${PROJECT}" 2>&1 | grep -q "Bump type"; then
          BUMPED_PROJECTS="${BUMPED_PROJECTS} ${PROJECT}"
        fi
      done

      if [[ -z "${BUMPED_PROJECTS}" ]]; then
        echo "No projects to release."
        exit 0
      fi

      # Run version bump (updates CHANGELOG.md, VERSION, creates tags)
      python3 scripts/version-bump.py ${BUMPED_PROJECTS}

      # Generate fab outputs for bumped projects
      for PROJECT in ${BUMPED_PROJECTS}; do
        echo "━━ Generating release outputs for ${PROJECT} ━━"
        STAGE=release
        *kibot_run
      done

      # Commit CHANGELOG.md and VERSION changes
      if [[ "${KIBASE_PROJECTS_DIR}" == "." ]]; then
        git add CHANGELOG.md VERSION 2>/dev/null || true
      else
        git add "${KIBASE_PROJECTS_DIR}"/*/CHANGELOG.md "${KIBASE_PROJECTS_DIR}"/*/VERSION 2>/dev/null || true
      fi
      if ! git diff --cached --quiet; then
        git commit -m "release: bump versions and update changelogs [skip ci]"
        git push "https://ci:${GITLAB_BOT_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" \
          "HEAD:${CI_DEFAULT_BRANCH}"
      fi

      # Push tags
      git push "https://ci:${GITLAB_BOT_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" --tags

      # Upload to package registry + create GitLab releases
      for PROJECT in ${BUMPED_PROJECTS}; do
        if [[ "${KIBASE_PROJECTS_DIR}" == "." ]]; then
          PROJECT_ROOT="."
          TAG="v$(cat VERSION 2>/dev/null || echo '0.0.0')"
        else
          PROJECT_ROOT="${KIBASE_PROJECTS_DIR}/${PROJECT}"
          TAG="${PROJECT}/v$(cat "${PROJECT_ROOT}/VERSION" 2>/dev/null || echo '0.0.0')"
        fi
        VERSION="$(cat "${PROJECT_ROOT}/VERSION" 2>/dev/null || echo "0.0.0")"
        KICAD_STEM="$(find "${PROJECT_ROOT}/kicad" -maxdepth 1 -name '*.kicad_pro' | head -n1 | xargs basename 2>/dev/null | sed 's/\.kicad_pro//')"

        # Build asset list and upload to Generic Package Registry
        FAB_ZIP="${PROJECT_ROOT}/output/release/${KICAD_STEM}-fab.zip"
        SCH_PDF="${PROJECT_ROOT}/output/review/schematic_${KICAD_STEM}.pdf"
        LAY_PDF="${PROJECT_ROOT}/output/review/layout_${KICAD_STEM}.pdf"
        PKG_BASE="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PROJECT}/${VERSION}"

        ASSET_META="$(python3 scripts/build-asset-links.py \
          --base-url "${PKG_BASE}" \
          "${FAB_ZIP}:Fabrication package (Gerbers + BOM + CPL):package" \
          "${SCH_PDF}:Schematic PDF:other" \
          "${LAY_PDF}:Layout PDF:other")"

        ASSET_LINKS="$(echo "${ASSET_META}" | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin)['links']))")"

        # Upload each file that exists
        echo "${ASSET_META}" | python3 -c "
import sys, json
for u in json.load(sys.stdin)['uploads']:
    print(u['local_path'] + '\t' + u['url'])
" | while IFS=$'\t' read -r local_path upload_url; do
          curl --silent --fail \
            --header "PRIVATE-TOKEN: ${GITLAB_BOT_TOKEN}" \
            --upload-file "${local_path}" \
            "${upload_url}"
          echo "  Uploaded $(basename "${local_path}") to registry"
        done

        # Create GitLab Release
        RELEASE_BODY="$(python3 -c "
import pathlib, re, sys
changelog = pathlib.Path(sys.argv[1]) / 'CHANGELOG.md'
text = changelog.read_text() if changelog.exists() else ''
m = re.search(r'(## \[v?[\d.]+\].*?)(?=## \[|\Z)', text, re.DOTALL)
print(m.group(1).strip() if m else 'Initial release')
" "${PROJECT_ROOT}")"

        RELEASE_BODY_JSON="$(printf '%s' "${RELEASE_BODY}" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")"

        curl --silent --fail \
          --header "PRIVATE-TOKEN: ${GITLAB_BOT_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "{
            \"name\": \"${PROJECT} v${VERSION}\",
            \"tag_name\": \"${TAG}\",
            \"description\": ${RELEASE_BODY_JSON},
            \"assets\": { \"links\": ${ASSET_LINKS} }
          }" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" \
          || echo "Warning: failed to create GitLab release for ${PROJECT}"

        echo "━━ Released ${PROJECT} v${VERSION} ━━"
      done
  artifacts:
    name: "release-${CI_COMMIT_SHORT_SHA}"
    paths:
      - "*/output/release/"
    expire_in: 90 days

# ── deploy stage — GitLab Pages ──────────────────────────────────────────────

pages:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs: [review:generate]
  script:
    - python3 pages/build_site.py --projects-dir "${KIBASE_PROJECTS_DIR}" --out-dir public
  artifacts:
    paths:
      - public

# ── MR cleanup (on MR close/merge) ──────────────────────────────────────────

kiri:cleanup:
  stage: review
  rules:
    - if: $CLEANUP_MR_IID
  script:
    - |
      if [[ -z "${GITLAB_BOT_TOKEN:-}" ]]; then
        echo "GITLAB_BOT_TOKEN not set — cannot clean up KiRI pages."
        exit 0
      fi
      git config user.email "ci@kibase"
      git config user.name  "kibase CI"
      REMOTE="https://ci:${GITLAB_BOT_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git fetch "${REMOTE}" kiri-pages:kiri-pages 2>/dev/null || exit 0
      git checkout kiri-pages
      if [[ -d "public/mr-${CLEANUP_MR_IID}" ]]; then
        git rm -rf "public/mr-${CLEANUP_MR_IID}"
        git commit -m "kiri: remove MR !${CLEANUP_MR_IID} pages"
        git push "${REMOTE}" kiri-pages
      fi
